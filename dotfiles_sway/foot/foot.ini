[main]
term=xterm-256color
font=monospace:size=12
dpi-aware=no
pad=14x14 center
workers=2
resize-by-cells=no

[scrollback]
lines=5000
multiplier=3.0
indicator-position=relative

[cursor]
style=beam
blink=yes
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[colors-dark]
background=1a1a1a
foreground=c0c0c0
regular0=2a2a2a
regular1=c06060
regular2=60a060
regular3=c0a060
regular4=60a0c0
regular5=9080a0
regular6=6090a0
regular7=c0c0c0
bright0=555555
bright1=d08080
bright2=80c080
bright3=d0b070
bright4=80b0d0
bright5=b0a0c0
bright6=80b0c0
bright7=e0e0e0
selection-foreground=1a1a1a
selection-background=888888
urls=888888

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
search-start=Control+Shift+r

[url]
launch=xdg-open ${url}
osc8-underline=always
label-letters=sadfjklewcmpgh

[tweak]
font-monospace-warn=no
render-timer=none
box-drawing-base-thickness=0.04
delayed-render-lower=500
delayed-render-upper=2000
max-shm-pool-size-mb=256
